# -- Number of probe replicas
replicaCount: 1

# -- Container image configuration
image:
  # -- Image repository
  repository: docker.io/jamesits/ripe-atlas
  # -- Image pull policy
  pullPolicy: Always
  # -- Image tag (defaults to appVersion)
  tag: "latest"

# -- Pod-level security context
# fsGroup ensures mounted volumes are owned by the ripe-atlas group (999)
podSecurityContext:
  fsGroup: 999

# -- Security context for the probe container (requires elevated privileges for network measurements)
securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    add: 
      - "NET_ADMIN"
      - "SYS_TIME"
      - "SYS_ADMIN"

# -- Resource limits and requests
resources:
  limits:
    cpu: "1"
    memory: "64Mi"
  requests:
    cpu: "100m"
    memory: "32Mi"

# -- Environment variables passed to the probe container
env:
  - name: "RXTXRPT"
    value: "yes"

# -- Persistence configuration for probe runtime data (/var/spool/ripe-atlas)
# Runtime data is ephemeral and regenerated on startup, so emptyDir is the default.
# Enable persistence only if you need spool data to survive pod restarts.
persistence:
  # -- Enable persistent storage for probe spool data
  enabled: false
  # -- PVC access mode
  accessMode: ReadWriteOnce
  # -- PVC storage size
  size: 512Mi
  # -- Storage class name (uses cluster default if not set)
  # storageClass: ""

# -- SSH key generation job configuration
job:
  sshKeyGen:
    # -- Enable automatic SSH keypair generation
    enabled: true

# -- Volume mounts for the probe container
volumeMounts:
  - name: ripe-atlas-key
    mountPath: "/etc/ripe-atlas/probe_key"
    subPath: probe_key
    readOnly: false
  - name: ripe-atlas-key
    mountPath: "/etc/ripe-atlas/probe_key.pub"
    readOnly: false
    subPath: probe_key.pub

# -- Volumes for the probe pod
volumes:
  - name: ripe-atlas-key
    secret:
      secretName: ripe-atlas-secret