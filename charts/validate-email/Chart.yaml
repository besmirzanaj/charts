apiVersion: v2
name: validate-email
type: application
version: "1.1.0"
appVersion: "1.1.0"
description: >-
  Email deliverability validation API. Checks whether an email address is
  actually active by resolving the domain's MX records and probing the SMTP
  server with a RCPT TO command. Authenticated via static API keys (X-API-Key header).
home: https://gitlab.com/besmirzanaj/validate-email
sources:
