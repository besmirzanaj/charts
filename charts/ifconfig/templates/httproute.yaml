{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ifconfig.fullname" . }}
  labels:
    {{- include "ifconfig.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .name }}
      namespace: {{ .namespace }}
      sectionName: {{ .sectionName }}
    {{- end }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "ifconfig.fullname" . }}
          port: {{ $.Values.service.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
