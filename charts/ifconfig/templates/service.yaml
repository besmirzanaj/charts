apiVersion: v1
kind: Service
metadata:
  name: {{ include "ifconfig.fullname" . }}
  labels:
    {{- include "ifconfig.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ifconfig.selectorLabels" . | nindent 4 }}
